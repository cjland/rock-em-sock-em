  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dth:100%;height:100%;object-fit:cover\">\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"fans\" style=\"scroll-margin-top:70px;padding:78px 18px;background:#0c0d10\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:14px\">\n        <div>\n          <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.2em;color:#2e6bf2\">// THE ELITE 152<\u002Fspan>\n          <h2 style=\"margin:6px 0 0;font-family:Anton;font-size:clamp(34px,6.5vw,72px);text-transform:uppercase;line-height:0.9\">The Groupies<\u002Fh2>\n        <\u002Fdiv>\n        <button onclick=\"{{ shufflePhotos }}\" style=\"background:transparent;border:2px solid rgba(244,240,230,0.35);color:#f4f0e6;font-family:'Barlow';font-weight:700;text-transform:uppercase;letter-spacing:0.04em;font-size:13px;padding:11px 20px;border-radius:2px;cursor:pointer\" style-hover=\"border-color:#e6362b;color:#e6362b\">⤮ Shuffle the Pit<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"max-width:680px;margin:0 0 28px;color:#cdc9bd;font-size:16px;line-height:1.55\">150 isn't a stadium crowd (yet) — but you're the OGs, the die-hards who knew about us before it was cool. Every show, we're playing for you. 🤘<\u002Fp>\n      <div style=\"column-width:210px;column-gap:12px\">\n        <sc-for list=\"{{ photos }}\" as=\"p\" hint-placeholder-count=\"12\">\n          <img src=\"{{ p.url }}\" alt=\"Rock'Em Sock'Em fan\" loading=\"lazy\" onclick=\"{{ p.open }}\" style=\"width:100%;margin:0 0 12px;border-radius:3px;break-inside:avoid;cursor:pointer;border:1px solid rgba(244,240,230,0.08);transition:transform .2s,border-color .2s\" style-hover=\"border-color:#e6362b;transform:scale(1.035)\">\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"merch\" style=\"scroll-margin-to over quantity, right? Join the fan club, get show alerts, and earn your undeserved groupie street cred.<\u002Fp>\n      <a href=\"{{ fanForm }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;background:#0c0d10;color:#fff;font-weight:700;font-size:17px;letter-spacing:0.04em;text-transform:uppercase;padding:18px 38px;border-radius:2px\" style-hover=\"background:#000;transform:translateY(-2px)\">Sign Up — It's Free 🤘<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#0c0d10;border-top:1px solid rgba(244,240,230,0.12);padding:60px 18px 40px\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:34px\">\n        <div>\n          <img src=\"https://rock-em-sock-em.com/wp-content/uploads/2025/02/Rock-Em-Sock-Front-200.png\" alt=\"Rock'Em Sock'Em\" style=\"height:60px;width:auto;margin-bottom:14px\">\n          <p style=\"margin:0;color:#8b8a83;font-size:14px;line-height:1.5\">Putting the knockout in rock &amp; roll. Serving South Orange County and then some (within reason).<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#e6362b;margin-bottom:14px\">BOOKING<\u002Fdiv>\n          <a href=\"{{ bookHref }}\" style=\"display:block;text-decoration:none;color:#f4f0e6;font-weight:600;font-size:16px;margin-bottom:8px\" style-hover=\"color:#e6362b\">{{ email }}<\u002Fa>\n          <a href=\"tel:+19496829271\" style=\"display:block;text-decoration:none;color:#f4f0e6;font-weight:600;font-size:16px\" style-hover=\"color:#e6362b\">{{ phone }}<\u002Fa>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#2e6bf2;margin-bottom:14px\">FOLLOW<\u002Fdiv>\n          <a href=\"{{ ytPlaylist }}\" target=\"_blank\" rel=\"noopener\" style=\"display:block;te .jpeg',\n    'https://rock-em-sock-em.com/wp-content/uploads/2025/04/IMG_0911-1024x768.jpeg',\n    'https://rock-em-sock-em.com/wp-content/uploads/2025/04/IMG_0904-e1745857664241-1024x707.jpeg',\n    'https://rock-em-sock-em.com/wp-content/uploads/2025/04/IMG_0893-1024x768.jpeg',\n    'https://rock-em-sock-em.com/wp-content/uploads/2025/04/IMG_0892-1024x768.jpeg',\n    'https://rock-em-sock-em.com/wp-content/uploads/2025/04/IMG_0895-1024x768.jpeg',\n  ];\n\n  get flatVideos(){\n    const out=[];\n    this.shows.forEach(s=>s.songs.forEach(song=>out.push(Object.assign({}, song, {venue:s.venue, city:s.city, date:s.date}))));\n    return out;\n  }\n\n  componentDidMount(){\n    const el=document.getElementById('stats');\n    if(el && 'IntersectionObserver' in window){\n      this.io=new IntersectionObserver((ents)=>{ ents.forEach(e=>{ if(e.isIntersecting && !this.state.countsDone) this.animateCounts(); }); },{threshold:0, rootMargin:'0px 0px -15% 0px'});\n      this.io.observe(el);\n    } else { this.animateCounts(); }\n    this._onScroll=()=>{ const s=window.scrollY>24; if(s!==this.state.scrolled) this.setState({scrolled:s}); };\n    window.addEventListener('scroll', this._onScroll, {passive:true});\n    this._onKey=(e)=>{ if(this.state.lightbox==null) return; if(e.key==='Escape') this.setState({lightbox:null}); else if(e.key==='ArrowRight') this.moveLightbox(1); else if(e.key==='ArrowLeft') this.moveLightbox(-1); };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount(){ if(this.io) this.io.disconnect(); if(this._onKey) window.removeEventListener('keydown', this._onKey); if(this._onScroll) window.removeEventListener('scroll', this._onScroll); }\n\n  animateCounts(){\n    if(this._animating) return; this._animating=true;\n    const targets=this.stats.map(s=>s.target); const dur=1700; const start=performance.now();\n    const tick=(now)=>{ const p=Math.min(1,(now-start)/dur); const e=1-Math.pow(1-p,3); this.setState({counts:targets.map(t=>Math.round(t*e))}); if(p<1) requestAnimationFrame(tick); else this.setState({counts:targets, countsDone:true}); };\n    requestAnimationFrame(tick);\n  }\n\n  goShows(){ const el=document.getElementById('shows'); if(el) window.scrollTo({top: el.getBoundingClientRect().top+window.scrollY-60, behavior:'smooth'}); }\n  playVideo(i){ this.setState({current:i, playing:true}); this.goShows(); }\n  playById(id){ const i=this.flatVideos.findIndex(v=>v.id===id); if(i>=0) this.playVideo(i); }\n  setFlyer(i){ this.setState({flyer:i}); }\n  moveFlyer(d){ const n=this.flyers.length; this.setState(s=>({flyer:(s.flyer+d+n)%n})); }\n  gotoFlyer(i){ this.setState({flyer:i}); const el=document.getElementById('flyers'); if(el) window.scrollTo({top: el.getBoundingClientRect().top+window.scrollY-60, behavior:'smooth'}); }\n\n  shufflePhotos(){ const a=(this.state.photoOrder||this.photos).slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; } this.setState({photoOrder:a}); }\n  openLightbox(i){ this.setState({lightbox:i}); }\n  moveLightbox(d){ const n=(this.state.photoOrder||this.photos).length; this.setState(s=>({lightbox:(s.lightbox+d+n)%n})); }\n\n  renderVals(){\n    const counts=this.state.counts;\n    const fmt=(n)=>(n||0).toLocaleString('en-US');\n    const statRows=this.stats.map((s,i)=>({label:s.label, value:fmt(counts[i])}));\n\n    const cur=this.flatVideos[this.state.current]||this.flatVideos[0];\n    const currentVideo={ title:cur.t, artist:cur.a, venue:cur.venue, city:cur.city, date:cur.date, embed:'https://www.youtube.com/embed/'+cur.id+'?rel=0&modestbranding=1&playsinline=1&autoplay=1', watch:'https://www.youtube.com/watch?v='+cur.id, poster:'https://i.ytimg.com/vi/'+cur.id+'/hqdefault.jpg' };\n\n    let idx=0;\n    const groups=this.shows.map(s=>({ venue:s.venue, city:s.city, date:s.date, songs:s.songs.map(song=>{\n      const fi=idx++; const active=fi===this.state.current;\n      return { t:song.t, a:song.a, play:()=>this.playVideo(fi),\n        rowStyle:'display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:12px 16px;background:'+(active?'rgba(230,54,43,0.14)':'transparent')+';border:0;border-left:3px solid '+(active?'#e6362b':'transparent')+';border-bottom:1px solid rgba(244,240,230,0.07);cursor:pointer;font-family:Barlow',\n        dotStyle:'font-size:11px;width:16px;flex:none;color:'+(active?'#e6362b':'#5f5e58') };\n    }) }));\n\n    const q=this.state.query.trim().toLowerCase();\n    const isSongs=this.state.setlistTab==='songs';\n    const songs=this.songs.filter(s=>s.t.toLowerCase().includes(q)||s.a.toLowerCase().includes(q)).map(s=>({ t:s.t, a:s.a, title:s.id?'Watch the live video':(s.t+' — '+s.a), hasVideo:!!s.id, play:s.id?(()=>this.playById(s.id)):null,\n      style:'display:inline-flex;align-items:baseline;gap:8px;padding:9px 15px;border-radius:2px;font-family:Barlow;background:#15161b;border:1px solid '+(s.id?'rgba(230,54,43,0.55)':'rgba(244,240,230,0.13)')+';cursor:'+(s.id?'pointer':'default'),\n      titleStyle:'font-size:15px;font-weight:700;color:'+(s.id?'#f4f0e6':'#cdc9bd'),\n      artistStyle:'font-size:12px;font-weight:500;color:#8b8a83' }));\n    const artists=this.artists.filter(a=>a.toLowerCase().includes(q));\n    const resultCount=isSongs ? (songs.length+' songs') : (artists.length+' artists');\n\n    const tabBase='font-family:Barlow;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;font-size:14px;padding:11px 22px;border:0;cursor:pointer;';\n    const songsTabStyle=tabBase+'background:'+(isSongs?'#e6362b':'transparent')+';color:'+(isSongs?'#fff':'#9a978c');\n    const artistsTabStyle=tabBase+'background:'+(!isSongs?'#e6362b':'transparent')+';color:'+(!isSongs?'#fff':'#9a978c');\n\n    const events=this.events.map(ev=>{\n      const hasFlyer = ev.flyer!=null;\n      return Object.assign({}, ev, {\n        hasFlyer, noFlyer:!hasFlyer,\n        flyerBg: hasFlyer ? 'position:absolute;inset:0;background-image:url('+this.flyers[ev.flyer]+');background-size:cover;background-position:center 20%' : '',\n        openFlyer: hasFlyer ? (()=>this.gotoFlyer(ev.flyer)) : null,\n      });\n    });\n\n    const fi=this.state.flyer;\n    const currentFlyer={ url:this.flyers[fi], n:(fi+1)+' / '+this.flyers.length, dl:'rockem-sockem-sawdust-2026-flyer-'+(fi+1)+'.jpg' };\n    const flyerThumbs=this.flyers.map((url,i)=>({ url, select:()=>this.setFlyer(i),\n      style:'flex:none;width:78px;height:98px;padding:0;border-radius:3px;overflow:hidden;cursor:pointer;background:#0c0d10;border:2px solid '+(i===fi?'#e6362b':'rgba(244,240,230,0.14)')+';opacity:'+(i===fi?'1':'0.6')+';transition:opacity .2s,border-color .2s' }));\n\n    const order=this.state.photoOrder||this.photos;\n    const photos=order.map((url,i)=>({ url, open:()=>this.openLightbox(i) }));\n    const lightboxOpen=this.state.lightbox!=null;\n    const lb=!lightboxOpen ? null : { url:order[this.state.lightbox], n:(this.state.lightbox+1)+' / '+order.length, prev:()=>this.moveLightbox(-1), next:()=>this.moveLightbox(1), close:()=>this.setState({lightbox:null}) };\n\n    const headerStyle='position:sticky;top:0;z-index:60;backdrop-filter:blur(12px);transition:background .3s,box-shadow .3s,border-color .3s;'+(this.state.scrolled\n      ? 'background:rgba(9,10,13,0.95);border-bottom:1px solid rgba(230,54,43,0.5);box-shadow:0 8px 30px rgba(0,0,0,0.55)'\n      : 'background:rgba(12,13,16,0.82);border-bottom:1px solid rgba(244,240,230,0.1)');\n\n    return {\n      headerStyle,\n      posterBgStyle:'position:absolute;inset:0;background-image:url('+currentVideo.poster+');background-size:cover;background-position:center;opacity:0.62',\n      isPlaying:this.state.playing, showPoster:!this.state.playing,\n      startPlaying:()=>this.setState({playing:true}),\n      logo:this.logo, email:this.email, phone:this.phone, bookHref:this.bookHref, fanForm:this.fanForm, ytPlaylist:this.ytPlaylist,\n      nav:this.nav, navOpen:this.state.navOpen,\n      toggleNav:()=>this.setState(s=>({navOpen:!s.navOpen})), closeNav:()=>this.setState({navOpen:false}),\n      statRows, currentVideo, groups, events, merch:this.merch,\n      currentFlyer, flyerThumbs, flyerReady:true,\n      prevFlyer:()=>this.moveFlyer(-1), nextFlyer:()=>this.moveFlyer(1),\n      isSongs, isArtists:!isSongs, songsTabStyle, artistsTabStyle,\n      showSongs:()=>this.setState({setlistTab:'songs'}), showArtists:()=>this.setState({setlistTab:'artists'}),\n      query:this.state.query, setQuery:(e)=>this.setState({query:e.target.value}),\n      songs, artists, resultCount,\n      photos, shufflePhotos:()=>this.shufflePhotos(),\n      lightboxOpen, lb,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
